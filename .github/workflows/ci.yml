name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            shell: bash
            command: ./mvnw -B -ntp verify
          - os: macos-latest
            shell: bash
            command: ./mvnw -B -ntp verify
          - os: windows-latest
            shell: pwsh
            command: .\mvnw.cmd -B -ntp verify

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Run build and tests
        shell: ${{ matrix.shell }}
        run: ${{ matrix.command }}

  docker-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t sports-intelligence-engine:ci .
