services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sports-intelligence-engine-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://postgres:5432/sports_intelligence
      DB_USERNAME: sports
      DB_PASSWORD: sports
      SIMULATION_INTERVAL_MS: 5000
      CONSUMER_INTERVAL_MS: 1000
    ports:
      - "8080:8080"

  postgres:
    image: postgres:16-alpine
    container_name: sports-intelligence-engine-postgres
    environment:
      POSTGRES_DB: sports_intelligence
      POSTGRES_USER: sports
      POSTGRES_PASSWORD: sports
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sports -d sports_intelligence"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
